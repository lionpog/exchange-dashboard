    <style>
        body { font-family: 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif; }
        #map { width: 100%; height: 100%; border-radius: 0.75rem; z-index: 1; }
        
        /* 用純 CSS 畫地標，完全不用加載外部 img，避免因跨網域被阻擋 */
        .pure-css-marker {
            width: 24px;
            height: 24px;
            border-radius: 50% 50% 50% 0;
            position: absolute;
            transform: rotate(-45deg);
            left: 50%;
            top: 50%;
            margin: -12px 0 0 -12px;
            box-shadow: -1px 2px 4px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* 地標中間的小白點 */
        .pure-css-marker::after {
            content: '';
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            transform: rotate(45deg);
        }

        /* 第一名：亮橘色 */
        .marker-orange {
            background: #ea580c;
            border: 2px solid #ffffff;
        }

        /* 第二、三名：深藍色 */
        .marker-blue {
            background: #2563eb;
            border: 2px solid #ffffff;
        }
    </style>
</head>
