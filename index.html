<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>105~113年 本國學生出國進修交流數據看板 v6</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif; }
        #map { width: 100%; height: 100%; border-radius: 0.75rem; z-index: 1; }
        
        /* 第一名：明亮的橘色 */
        .orange-marker {
            filter: hue-rotate(15deg) brightness(1.2) saturate(3) drop-shadow(0px 2px 4px rgba(0,0,0,0.4));
        }
        /* 第二、三名：標準藍色 */
        .blue-marker {
            filter: hue-rotate(190deg) brightness(0.9) saturate(1.5) drop-shadow(0px 2px 4px rgba(0,0,0,0.4));
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-6 text-slate-800">

    <div class="max-w-7xl mx-auto space-y-5">
        
        <header class="bg-gradient-to-r from-slate-800 to-indigo-900 text-white p-5 rounded-2xl shadow-md">
            <h1 class="text-xl md:text-2xl font-bold tracking-wide">本國學生出國進修交流智慧數據看板</h1>
        </header>

        <section class="bg-white p-4 rounded-2xl shadow-xs grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1">選擇學年度</label>
                <select id="yearSelect" class="w-full bg-slate-50 border border-slate-200 text-sm rounded-xl p-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none"></select>
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1">學校設立別</label>
                <select id="typeSelect" class="w-full bg-slate-50 border border-slate-200 text-sm rounded-xl p-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                    <option value="all">全部（公立+私立）</option>
                    <option value="公立">公立 / 國立大學</option>
                    <option value="私立">私立大學</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1">選擇學校</label>
                <select id="schoolSelect" class="w-full bg-slate-50 border border-slate-200 text-sm rounded-xl p-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none"></select>
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1">選擇系所</label>
                <select id="deptSelect" class="w-full bg-slate-50 border border-slate-200 text-sm rounded-xl p-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none"></select>
            </div>
        </section>

        <main class="space-y-5">
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
                <div class="bg-white p-5 rounded-2xl shadow-xs flex flex-col h-[450px]">
                    <h2 class="text-sm font-bold text-slate-800 flex items-center gap-2 mb-3">
                        目的地國家交換人數排名 (前 15 名)
                    </h2>
                    <div class="flex-1 relative min-h-0">
                        <canvas id="rankingChart"></canvas>
                    </div>
                </div>

                <div class="bg-white p-5 rounded-2xl shadow-xs flex flex-col h-[450px]">
                    <h2 class="text-sm font-bold text-slate-800 flex items-center gap-2 mb-3">
                        前三名熱門交換國家地理定位
                    </h2>
                    <div class="flex-1 rounded-xl overflow-hidden border border-slate-100 relative min-h-0">
                        <div id="map"></div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-4">
                <div class="bg-blue-50/70 border border-blue-100 p-3 rounded-xl text-center shadow-xs">
                    <p class="text-xs text-blue-600 font-bold">總交流人數</p>
                    <p id="totalStudents" class="text-xl md:text-2xl font-black text-blue-700">0</p>
                </div>
                <div class="bg-indigo-50/70 border border-indigo-100 p-3 rounded-xl text-center shadow-xs">
                    <p class="text-xs text-indigo-600 font-bold">男生人數</p>
                    <p id="totalMaleCount" class="text-xl md:text-2xl font-black text-indigo-700">0</p>
                </div>
                <div class="bg-rose-50/70 border border-rose-100 p-3 rounded-xl text-center shadow-xs">
                    <p class="text-xs text-rose-600 font-bold">女生人數</p>
                    <p id="totalFemaleCount" class="text-xl md:text-2xl font-black text-rose-700">0</p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
                <div class="bg-white p-5 rounded-2xl shadow-xs flex flex-col h-[380px]">
                    <h2 class="text-sm font-bold text-slate-800 mb-2 flex items-center gap-2">
                        出國進修交流大區域分佈
                    </h2>
                    <div class="flex-1 relative flex justify-center items-center min-h-0">
                        <div class="w-[300px] h-[300px]">
                            <canvas id="regionChart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-5 rounded-2xl shadow-xs flex flex-col h-[380px]">
                    <h2 class="text-sm font-bold text-slate-800 mb-2 flex items-center gap-2">
                        交流學生性別比例分布
                    </h2>
                    <div class="flex-1 relative flex justify-center items-center min-h-0">
                        <div class="w-[260px] h-[260px]">
                            <canvas id="genderChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

         </main>
    </div>

    <script>
        Chart.register(ChartDataLabels);

        const csvFileName = "學5.日間學制本國學生出國進修交流人數-以「系(所)」統計.csv";
        let rawData = [];
        
        let rankingChartInstance = null;
        let genderChartInstance = null;
        let regionChartInstance = null;
        let mapInstance = null;
        let mapMarkers = [];

        const countryCoordinates = {
            "日本": [36.2048, 138.2529], "大韓民國(南韓)": [35.9078, 127.7669], "南韓": [35.9078, 127.7669],
            "大陸地區": [35.8617, 104.1954], "中國大陸": [35.8617, 104.1954], "美利堅合眾國": [37.0902, -95.7129],
            "美國": [37.0902, -95.7129], "德意志聯邦共和國": [51.1657, 10.4515], "德國": [51.1657, 10.4515],
            "法蘭西共和國": [46.2276, 2.2137], "法國": [46.2276, 2.2137], "英國": [55.3781, -3.4360],
            "大不列顛與北愛爾蘭聯合王國": [55.3781, -3.4360], "西班牙": [40.4637, -3.7492], "西班牙王國": [40.4637, -3.7492],
            "荷蘭": [52.1326, 5.2913], "荷蘭王國": [52.1326, 5.2913], "加拿大": [56.1304, -106.3468],
            "澳大利亞": [-25.2744, 133.7751], "澳洲": [-25.2744, 133.7751], "新加坡": [1.3521, 103.8198],
            "新加坡共和國": [1.3521, 103.8198], "泰國": [15.8700, 100.9925], "泰王國": [15.8700, 100.9925],
            "越南": [14.0583, 108.2772], "越南社會主義共和國": [14.0583, 108.2772], "馬來西亞": [4.2105, 101.9758],
            "奧地利": [47.5162, 14.5501], "奧地利共和國": [47.5162, 14.5501], "瑞典": [60.1282, 18.6435],
            "瑞典王國": [60.1282, 18.6435], "瑞士": [46.8182, 8.2275], "瑞士聯邦": [46.8182, 8.2275],
            "義大利": [41.8719, 12.5674], "義大利共和國": [41.8719, 12.5674], "比利時": [50.5039, 4.4699],
            "比利時王國": [50.5039, 4.4699], "捷克共和國": [49.8175, 15.4730], "捷克": [49.8175, 15.4730],
            "波蘭": [51.9194, 19.1451], "波蘭共和國": [51.9194, 19.1451], "芬蘭": [61.9241, 25.7482],
            "芬蘭共和國": [61.9241, 25.7482], "丹麥": [56.2639, 9.5018], "丹麥王國": [56.2639, 9.5018],
            "紐西蘭": [-40.9006, 174.8860], "香港": [22.3193, 114.1694], "澳門": [22.1987, 113.5439],
            "菲律賓": [12.8797, 121.7740], "印度尼西亞": [-0.7893, 113.9213], "印尼": [-0.7893, 113.9213],
            "印度": [20.5937, 78.9629], "愛爾蘭": [53.4129, -8.2439], "挪威": [60.4720, 8.4689],
            "冰島": [64.9631, -19.0208], "立陶宛共和國": [55.1694, 23.8813], "立陶宛": [55.1694, 23.8813],
            "土耳切": [38.9637, 35.2433]
        };

        const yearSelect = document.getElementById('yearSelect');
        const typeSelect = document.getElementById('typeSelect');
        const schoolSelect = document.getElementById('schoolSelect');
        const deptSelect = document.getElementById('deptSelect');

        function initMap() {
            mapInstance = L.map('map', {
                center: [25, 25],
                zoom: 1,
                minZoom: 1,
                maxZoom: 7
            });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; CARTO'
            }).addTo(mapInstance);
        }

        Papa.parse(csvFileName, {
            download: true,
            header: true,
            dynamicTyping: true,
            skipEmptyLines: true,
            complete: function(results) {
                rawData = results.data;
                initMap();
                initYearDropdown();
            }
        });

        function initYearDropdown() {
            const years = [...new Set(rawData.map(item => item['學年度']))].filter(Boolean).sort((a, b) => b - a);
            yearSelect.innerHTML = '<option value="all">全部年度 (105~113)</option>';
            years.forEach(y => { yearSelect.innerHTML += `<option value="${y}">${y} 學年度</option>`; });

            yearSelect.addEventListener('change', onFilterChange);
            typeSelect.addEventListener('change', onFilterChange);
            schoolSelect.addEventListener('change', onSchoolChange);
            deptSelect.addEventListener('change', updateDashboardUI);

            onFilterChange();
        }

        function onFilterChange() {
            const selectedYear = yearSelect.value;
            const selectedType = typeSelect.value;
            let filtered = rawData;
            
            if (selectedYear !== 'all') filtered = filtered.filter(item => String(item['學年度']) === selectedYear);
            if (selectedType !== 'all') filtered = filtered.filter(item => item['設立別'] === selectedType);

            const schools = [...new Set(filtered.map(item => item['學校名稱']))].filter(Boolean).sort();
            schoolSelect.innerHTML = '<option value="all">全部學校</option>';
            schools.forEach(s => { schoolSelect.innerHTML += `<option value="${s}">${s}</option>`; });

            onSchoolChange();
        }

        function onSchoolChange() {
            const selectedYear = yearSelect.value;
            const selectedType = typeSelect.value;
            const selectedSchool = schoolSelect.value;
            let filtered = rawData;

            if (selectedYear !== 'all') filtered = filtered.filter(item => String(item['學年度']) === selectedYear);
            if (selectedType !== 'all') filtered = filtered.filter(item => item['設立別'] === selectedType);
            if (selectedSchool !== 'all') filtered = filtered.filter(item => item['學校名稱'] === selectedSchool);

            const depts = [...new Set(filtered.map(item => item['系所名稱']))].filter(Boolean).sort();
            deptSelect.innerHTML = '<option value="all">全部系所</option>';
            depts.forEach(d => { deptSelect.innerHTML += `<option value="${d}">${d}</option>`; });

            updateDashboardUI();
        }

        function updateDashboardUI() {
            const targetYear = yearSelect.value;
            const targetType = typeSelect.value;
            const targetSchool = schoolSelect.value;
            const targetDept = deptSelect.value;

            let finalData = rawData;
            if (targetYear !== 'all') finalData = finalData.filter(item => String(item['學年度']) === targetYear);
            if (targetType !== 'all') finalData = finalData.filter(item => item['設立別'] === targetType);
            if (targetSchool !== 'all') finalData = finalData.filter(item => item['學校名稱'] === targetSchool);
            if (targetDept !== 'all') finalData = finalData.filter(item => item['系所名稱'] === targetDept);

            const countryCounters = {};
            const regionCounters = {};
            let totalMale = 0;
            let totalFemale = 0;

            finalData.forEach(row => {
                const country = row['進修交流國家(地區)別'];
                const region = row['進修交流國家(地區)區域別'];
                if (!country) return;

                const m1 = Number(row['本國學生出國進修交流至少1學期(修讀學分)以上人數男'] || 0);
                const f1 = Number(row['本國學生出國進修交流至少1學期(修讀學分)以上人數女'] || 0);
                const m2 = Number(row['本國學生出國進修交流未滿1學期(修讀學分)人數男'] || 0);
                const f2 = Number(row['本國學生出國進修交流未滿1學期(修讀學分)人數女'] || 0);

                const rowSum = m1 + f1 + m2 + f2;
                if (rowSum > 0) {
                    countryCounters[country] = (countryCounters[country] || 0) + rowSum;
                    if(region) regionCounters[region] = (regionCounters[region] || 0) + rowSum;
                    totalMale += (m1 + m2);
                    totalFemale += (f1 + f2);
                }
            });

            const sortedCountries = Object.entries(countryCounters).sort((a, b) => b[1] - a[1]).slice(0, 15);
            const countryLabels = sortedCountries.map(x => x[0]);
            const countryValues = sortedCountries.map(x => x[1]);

            document.getElementById('totalStudents').innerText = (totalMale + totalFemale).toLocaleString();
            document.getElementById('totalMaleCount').innerText = totalMale.toLocaleString();
            document.getElementById('totalFemaleCount').innerText = totalFemale.toLocaleString();

            // 更新地標
            mapMarkers.forEach(m => mapInstance.removeLayer(m));
            mapMarkers = [];

            const topThreeCountries = sortedCountries.slice(0, 3);
            const latLngBounds = [];

            const medalConfig = [
                { emoji: "🥇", color: "#ea580c" }, 
                { emoji: "🥈", color: "#1e3a8a" }, 
                { emoji: "🥉", color: "#1e3a8a" }  
            ];

            topThreeCountries.forEach((item, index) => {
                const countryName = item[0];
                const countValue = item[1];
                const coordinates = countryCoordinates[countryName];

                if (coordinates) {
                    let markerOptions = {};
                    
                    // 對調 className 綁定邏輯
                    if (index === 0) {
                        markerOptions.icon = L.divIcon({
                            className: 'orange-marker', // 第一名改用橘色
                            html: `<img src="https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png" style="width:25px; height:41px;"/>`,
                            iconSize: [25, 41],
                            iconAnchor: [12, 41],
                            popupAnchor: [1, -34]
                        });
                    } else {
                        markerOptions.icon = L.divIcon({
                            className: 'blue-marker', // 第二、三名改用藍色
                            html: `<img src="https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png" style="width:25px; height:41px;"/>`,
                            iconSize: [25, 41],
                            iconAnchor: [12, 41],
                            popupAnchor: [1, -34]
                        });
                    }

                    const marker = L.marker(coordinates, markerOptions).addTo(mapInstance)
                        .bindPopup(`
                            <div style="font-family: sans-serif; font-size:13px; line-height: 1.4;">
                                <b style="color:${medalConfig[index].color}; font-size:13px;">${medalConfig[index].emoji} 第 ${index + 1} 名</b><br>
                                <b>國家：</b>${countryName}<br>
                                <b>交流人數：</b>${countValue.toLocaleString()} 人
                            </div>
                        `);
                    
                    if (index === 0) marker.openPopup(); 
                    mapMarkers.push(marker);
                    latLngBounds.push(coordinates);
                }
            });

            if (latLngBounds.length > 0 && mapInstance) {
                mapInstance.fitBounds(latLngBounds, { padding: [60, 60], maxZoom: 4 });
            }

            // 圖表 1：橫條圖
            const ctxRanking = document.getElementById('rankingChart').getContext('2d');
            if (rankingChartInstance) rankingChartInstance.destroy();

            const orangeGoldGrad = ctxRanking.createLinearGradient(0, 0, 400, 0);
            orangeGoldGrad.addColorStop(0, '#fde047'); 
            orangeGoldGrad.addColorStop(1, '#ea580c'); 

            const barBackgroundColors = [];
            const barBorderColors = [];
            for (let i = 0; i < countryValues.length; i++) {
                if (i === 0) {
                    barBackgroundColors.push(orangeGoldGrad); 
                    barBorderColors.push('#ea580c');
                } else if (i < 3) {
                    barBackgroundColors.push('rgba(55, 48, 163, 0.85)'); 
                    barBorderColors.push('rgb(67, 56, 202)');
                } else {
                    barBackgroundColors.push('rgba(59, 130, 246, 0.75)'); 
                    barBorderColors.push('rgb(37, 99, 235)');
                }
            }

            rankingChartInstance = new Chart(ctxRanking, {
                type: 'bar',
                data: {
                    labels: countryLabels,
                    datasets: [{
                        data: countryValues,
                        backgroundColor: barBackgroundColors,
                        borderColor: barBorderColors,
                        borderWidth: function(context) {
                            return context.dataIndex === 0 ? 2.5 : 1.2;
                        },
                        borderRadius: 4
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: false },
                        datalabels: { display: false }
                    },
                    scales: { 
                        x: { beginAtZero: true, ticks: { precision: 0 } },
                        y: {
                            ticks: {
                                callback: function(value, index, ticks) {
                                    const label = countryLabels[index];
                                    if (index === 0) {
                                        return '👑 ' + label;
                                    }
                                    return label;
                                },
                                font: {
                                    weight: function(context) {
                                        return context.index === 0 ? 'bold' : 'normal';
                                    },
                                    size: function(context) {
                                        return context.index === 0 ? 13 : 12;
                                    }
                                },
                                color: function(context) {
                                    return context.index === 0 ? '#ea580c' : '#475569'; 
                                }
                            }
                        }
                    }
                }
            });

            // 圖表 2：大區域分佈
            const regionLabels = Object.keys(regionCounters);
            const regionValues = Object.values(regionCounters);
            const regionColors = ['#f59e0b', '#8b5cf6', '#14b8a6', '#ec4899', '#64748b', '#22c55e', '#ef4444', '#3b82f6'];
            
            const regionTotal = regionValues.reduce((sum, val) => sum + val, 0);

            const ctxRegion = document.getElementById('regionChart').getContext('2d');
            if (regionChartInstance) regionChartInstance.destroy();
            regionChartInstance = new Chart(ctxRegion, {
                type: 'pie',
                data: {
                    labels: regionLabels,
                    datasets: [{
                        data: regionValues,
                        backgroundColor: regionColors.slice(0, regionLabels.length),
                        borderColor: '#fff',
                        borderWidth: 1.5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { position: 'right', labels: { boxWidth: 10, font: { size: 10 } } },
                        datalabels: {
                            display: true,
                            color: '#ffffff',
                            font: { weight: 'bold', size: 11 },
                            formatter: (value) => {
                                if (value === 0 || regionTotal === 0) return '';
                                const percentage = ((value / regionTotal) * 100).toFixed(1);
                                return percentage > 4 ? `${percentage}%` : '';
                            },
                            textAlign: 'center'
                        }
                    }
                }
            });

            // 圖表 3：男女比例圓餅圖
            const ctxGender = document.getElementById('genderChart').getContext('2d');
            if (genderChartInstance) genderChartInstance.destroy();
            
            const genderTotal = totalMale + totalFemale;

            genderChartInstance = new Chart(ctxGender, {
                type: 'pie',
                data: {
                    labels: ['男生', '女生'],
                    datasets: [{
                        data: [totalMale, totalFemale],
                        backgroundColor: ['rgba(54, 162, 235, 0.85)', 'rgba(244, 63, 94, 0.85)'],
                        borderColor: ['#fff', '#fff'],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { position: 'bottom' },
                        datalabels: {
                            color: '#ffffff',
                            font: { weight: 'bold', size: 12 },
                            formatter: (value) => {
                                if (value === 0 || genderTotal === 0) return '';
                                const percentage = ((value / genderTotal) * 100).toFixed(1);
                                return `${value}人\n(${percentage}%)`;
                            },
                            textAlign: 'center'
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
